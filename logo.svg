<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Rounded square background -->
  <rect width="512" height="512" rx="110" fill="#2D5BE3"/>

  <!-- Location pin shape (teardrop) -->
